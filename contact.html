     <div class="cursor" id="cursor"></div>

   <nav>
    <a href="./index.html" class="logo">ERA</a>
    <div class="nav-links">
  
      <a href="./events.html" class="nav-link">EVENTS</a>
      <a href="./resources.html" class="nav-link">RESOURCES</a>

   <section id="contact">
  <p class="section-index reveal">03 — Contact</p>
  <h2 class="reveal">Get in<br><span style="color: rgb(255, 255, 255);">touch</span></h2>

  <div class="contact-layout">
    <div class="contact-left">

      <!-- static links -->
      <div class="contact-grid">
        <div class="contact-item">
          <div class="contact-platform">Email</div>
          <a href="mailto:erallianceinfo@gmail.com" class="contact-value">erallianceinfo@gmail.com</a>
        </div>
        <div class="contact-item">
          <div class="contact-platform">Instagram</div>
          <a href="https://instagram.com/_era_central" class="contact-value" target="_blank">@_era_central</a>
        </div>
        <div class="contact-item">
          <div class="contact-platform">Discord</div>
          <a href="YOUR_DISCORD_LINK" class="contact-value" target="_blank">ERA Robotics Competition</a>
        </div>
      </div>

      <!-- contact form -->
      <form id="contact-form" class="era-form">
        <div class="form-row">
          <input type="text" name="from_name" placeholder="YOUR NAME" required />
        </div>
        <div class="form-row">
          <input type="email" name="from_email" placeholder="YOUR EMAIL" required />
        </div>
        <div class="form-row">
          <textarea name="message" rows="5" placeholder="YOUR MESSAGE" required></textarea>
        </div>
        <button type="submit" class="btn" id="submit-btn" style="color: black">SEND MESSAGE →</button>
        <p id="form-status"></p>
      </form>

    </div>

    <div class="contact-spline">
      <spline-viewer url="https://prod.spline.design/w1coSZeUGOYPw49H/scene.splinecode"></spline-viewer>
    </div>
  </div>
</section>
   
</section>

<style>
   nav {

      font-size: 12px; font-weight: 500; letter-spacing: 0.22em;

  footer { padding: 1.2rem; flex-wrap: wrap; gap: 0.7rem; }
